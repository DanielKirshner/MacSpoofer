name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR: ${{ github.event.pull_request.number }}

            Review this PR. For every issue you find, post a separate
            inline comment anchored to the exact file and line using the
            `mcp__github_inline_comment__create_inline_comment` tool.

            Rules:
            - One tool call per finding. Do NOT batch findings into one comment.
            - Do NOT post an overall summary comment. Only inline comments.
            - Each comment: what's wrong, why, and a concrete suggested fix
              (use a ```suggestion block when you can replace lines directly).
            - Skip nits unless they affect correctness, security, or readability.
            - If there are zero issues, post one short approval comment and stop.
