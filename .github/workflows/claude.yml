name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          additional_permissions: |
            actions: read

          prompt: |
            Follow the instruction in the @claude mention that triggered this run.

            If the request is a code review of this PR:
            - Post one inline comment per finding using the
              `mcp__github_inline_comment__create_inline_comment` tool, anchored
              to the exact file and line.
            - Do NOT batch findings into one comment.
            - Do NOT post an overall summary comment. Only inline comments.
            - Each comment: what's wrong, why, and a concrete suggested fix
              (use a ```suggestion block when you can replace lines directly).
            - Skip nits unless they affect correctness, security, or readability.
            - If there are zero issues, post one short approval comment and stop.

            For any other kind of request, just do what was asked.
